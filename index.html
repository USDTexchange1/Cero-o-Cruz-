<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tres en Raya PRO</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
        margin: 0;
    }

    h1 {
        margin-top: 20px;
    }

    .selector {
        margin: 20px;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
    }

    .x { background: #ff4d4d; color: white; }
    .o { background: #4da6ff; color: white; }

    .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: rgba(255,255,255,0.1);
        font-size: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 10px;
    }

    .cell:hover {
        background: rgba(255,255,255,0.2);
    }

    #status {
        margin-top: 20px;
        font-size: 20px;
    }

    .restart {
        margin-top: 20px;
        background: #00cc99;
    }
</style>
</head>

<body>

<h1>🎮 Tres en Raya PRO</h1>

<div class="selector">
    <p>Elige tu símbolo:</p>
    <button class="x" onclick="startGame('X')">❌</button>
    <button class="o" onclick="startGame('O')">⭕</button>
</div>

<div class="board" id="board"></div>

<div id="status"></div>

<button class="restart" onclick="restartGame()">Reiniciar</button>

<script>
let board = ["","","","","","","","",""];
let player = "X";
let ai = "O";
let gameActive = false;

function startGame(choice) {
    player = choice;
    ai = (choice === "X") ? "O" : "X";
    gameActive = true;
    board = ["","","","","","","","",""];
    renderBoard();

    document.getElementById("status").innerText = "Juego iniciado";

    if (ai === "X") {
        aiMove();
    }
}

function renderBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    board.forEach((cell, index) => {
        const div = document.createElement("div");
        div.classList.add("cell");
        div.innerText = cell;
        div.onclick = () => playerMove(index);
        boardDiv.appendChild(div);
    });
}

function playerMove(index) {
    if (!gameActive || board[index] !== "") return;

    board[index] = player;
    renderBoard();

    if (checkWinner(board, player)) {
        endGame("🎉 Ganaste");
        return;
    }

    if (boardFull()) {
        endGame("🤝 Empate");
        return;
    }

    aiMove();
}

function aiMove() {
    let bestScore = -Infinity;
    let move;

    for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
            board[i] = ai;
            let score = minimax(board, 0, false);
            board[i] = "";
            if (score > bestScore) {
                bestScore = score;
                move = i;
            }
        }
    }

    board[move] = ai;
    renderBoard();

    if (checkWinner(board, ai)) {
        endGame("💻 El sistema gana");
        return;
    }

    if (boardFull()) {
        endGame("🤝 Empate");
    }
}

function minimax(newBoard, depth, isMaximizing) {
    if (checkWinner(newBoard, ai)) return 10 - depth;
    if (checkWinner(newBoard, player)) return depth - 10;
    if (newBoard.every(cell => cell !== "")) return 0;

    if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (newBoard[i] === "") {
                newBoard[i] = ai;
                best = Math.max(best, minimax(newBoard, depth + 1, false));
                newBoard[i] = "";
            }
        }
        return best;
    } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
            if (newBoard[i] === "") {
                newBoard[i] = player;
                best = Math.min(best, minimax(newBoard, depth + 1, true));
                newBoard[i] = "";
            }
        }
        return best;
    }
}

function checkWinner(b, p) {
    const wins = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    return wins.some(combo => combo.every(i => b[i] === p));
}

function boardFull() {
    return board.every(cell => cell !== "");
}

function endGame(message) {
    gameActive = false;
    document.getElementById("status").innerText = message;
}

function restartGame() {
    board = ["","","","","","","","",""];
    gameActive = false;
    renderBoard();
    document.getElementById("status").innerText = "Elige símbolo para empezar";
}

renderBoard();
</script>

</body>
</html>
